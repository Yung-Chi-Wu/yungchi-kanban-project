<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Play | Kanban Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="p-6 md:p-10 text-slate-200">
    <header class="flex justify-between items-center mb-10">
        <h1 class="text-3xl font-black italic tracking-tighter text-indigo-500">NEXT PLAY <span
                class="text-white text-2xl not-italic">GAMES</span></h1>

        <div class="flex flex-1 max-w-md mx-4 w-full">
            <input id="searchInput" type="text" placeholder="Search tasks..."
                class="w-full bg-slate-900 border border-slate-700 px-4 py-2 rounded-full focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
        </div>

        <button onclick="openModal()"
            class="bg-indigo-600 px-6 py-2 rounded-full font-bold hover:bg-indigo-500 shadow-lg shadow-indigo-500/20 transition-all hover:scale-105 active:scale-95">＋
            New Task</button>
    </header>

    <main class="grid grid-cols-1 md:grid-cols-4 gap-6">
        <div class="col-wrapper">
            <h3 class="status-header text-slate-500">TODO</h3>
            <div id="TODO" class="kanban-column"></div>
        </div>
        <div class="col-wrapper">
            <h3 class="status-header text-amber-500">IN PROGRESS</h3>
            <div id="IN_PROGRESS" class="kanban-column"></div>
        </div>
        <div class="col-wrapper">
            <h3 class="status-header text-blue-500">IN REVIEW</h3>
            <div id="IN_REVIEW" class="kanban-column"></div>
        </div>
        <div class="col-wrapper">
            <h3 class="status-header text-emerald-500">DONE</h3>
            <div id="DONE" class="kanban-column"></div>
        </div>
    </main>

    <div id="taskModal"
        class="hidden fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center z-50 p-4">
        <div class="bg-slate-800 p-8 rounded-3xl w-full max-w-md border border-slate-700 shadow-2xl transition-all">
            <h2 class="text-xl font-bold mb-6 text-white">Add New Task</h2>

            <input id="taskTitle" type="text" placeholder="What needs to be done?"
                class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl mb-4 focus:ring-2 focus:ring-indigo-500 outline-none text-white">

            <textarea id="taskDesc" placeholder="Any extra details?"
                class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl mb-4 h-32 outline-none resize-none text-white"></textarea>

            <div class="mb-6">
                <label class="text-[10px] font-bold text-slate-500 mb-2 block tracking-widest uppercase">Select
                    Label</label>
                <select id="taskLabel"
                    class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none text-slate-300 focus:ring-2 focus:ring-indigo-500">
                    <option value="Feature">✨ Feature</option>
                    <option value="Bug">🪲 Bug</option>
                    <option value="Design">🎨 Design</option>
                    <option value="Urgent">🔥 Urgent</option>
                </select>
            </div>

            <div class="flex gap-4">
                <button onclick="closeModal()"
                    class="flex-1 text-slate-400 font-semibold hover:text-white transition">Cancel</button>
                <button id="saveBtn"
                    class="flex-1 bg-indigo-600 py-3 rounded-xl font-bold hover:bg-indigo-500 transition disabled:opacity-50">Create</button>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="app.js"></script>
</body>

</html>
